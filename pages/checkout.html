<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - MatchaShop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            matcha: {
              50: '#F5F9F0',
              100: '#E8F3DC',
              200: '#C8E6A0',
              300: '#A8D46A',
              400: '#8AAD5A',
              500: '#6B8F47',
              600: '#5C7A3E',
              700: '#4A6332',
              800: '#3D5229',
              900: '#2E3D1E',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-in { animation: modalIn 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-matcha-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">

  <!-- Navbar -->
  <div id="navbar"></div>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">
    <!-- Page Header -->
    <div class="flex items-center gap-3 mb-6">
      <a href="cart.html" class="text-gray-400 hover:text-matcha-600 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Checkout</h1>
    </div>

    <!-- Progress Steps -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-matcha-600 text-white flex items-center justify-center text-sm font-bold">✓</div>
        <span class="text-sm font-medium text-matcha-600 hidden sm:block">Keranjang</span>
      </div>
      <div class="w-12 h-0.5 bg-matcha-600"></div>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-matcha-600 text-white flex items-center justify-center text-sm font-bold">2</div>
        <span class="text-sm font-medium text-matcha-600 hidden sm:block">Checkout</span>
      </div>
      <div class="w-12 h-0.5 bg-gray-300 dark:bg-gray-600"></div>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-500 flex items-center justify-center text-sm font-bold">3</div>
        <span class="text-sm text-gray-400 hidden sm:block">Selesai</span>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
      <!-- Checkout Form -->
      <div class="lg:col-span-3">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6">
          <h2 class="text-lg font-bold text-gray-800 dark:text-white mb-5 flex items-center gap-2">
            <svg class="w-5 h-5 text-matcha-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Informasi Pengiriman
          </h2>

          <form id="checkoutForm" class="space-y-4">
            <!-- Full Name -->
            <div>
              <label for="fullName" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
                Nama Lengkap <span class="text-red-500">*</span>
              </label>
              <input
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Nama penerima"
                required
                class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-matcha-400 focus:border-transparent transition"
              />
            </div>

            <!-- Address -->
            <div>
              <label for="address" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
                Alamat Lengkap <span class="text-red-500">*</span>
              </label>
              <textarea
                id="address"
                name="address"
                rows="3"
                placeholder="Jl. Contoh No. 123, Kelurahan, Kecamatan, Kota, Kode Pos"
                required
                class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-matcha-400 focus:border-transparent transition resize-none"
              ></textarea>
            </div>

            <!-- Phone -->
            <div>
              <label for="phone" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
                Nomor HP <span class="text-red-500">*</span>
              </label>
              <div class="relative">
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  placeholder="08xxxxxxxxxx"
                  required
                  class="w-full px-4 py-3 pl-11 border border-gray-200 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-matcha-400 focus:border-transparent transition"
                />
                <svg class="absolute left-3.5 top-3.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
              </div>
            </div>

            <!-- Payment Method -->
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">
                Metode Pembayaran <span class="text-red-500">*</span>
              </label>
              <div class="space-y-2">
                <!-- Transfer Bank -->
                <label class="flex items-center gap-3 p-4 border-2 border-gray-200 dark:border-gray-600 rounded-xl cursor-pointer hover:border-matcha-400 transition-all duration-200 has-[:checked]:border-matcha-500 has-[:checked]:bg-matcha-50 dark:has-[:checked]:bg-matcha-900">
                  <input type="radio" name="payment" value="Transfer Bank" class="accent-matcha-600 w-4 h-4" />
                  <div class="flex items-center gap-3 flex-1">
                    <span class="text-2xl">🏦</span>
                    <div>
                      <p class="font-medium text-gray-800 dark:text-white text-sm">Transfer Bank</p>
                      <p class="text-xs text-gray-500 dark:text-gray-400">BCA, Mandiri, BNI, BRI</p>
                    </div>
                  </div>
                </label>

                <!-- COD -->
                <label class="flex items-center gap-3 p-4 border-2 border-gray-200 dark:border-gray-600 rounded-xl cursor-pointer hover:border-matcha-400 transition-all duration-200 has-[:checked]:border-matcha-500 has-[:checked]:bg-matcha-50 dark:has-[:checked]:bg-matcha-900">
                  <input type="radio" name="payment" value="COD" class="accent-matcha-600 w-4 h-4" />
                  <div class="flex items-center gap-3 flex-1">
                    <span class="text-2xl">💵</span>
                    <div>
                      <p class="font-medium text-gray-800 dark:text-white text-sm">COD (Bayar di Tempat)</p>
                      <p class="text-xs text-gray-500 dark:text-gray-400">Bayar saat barang tiba</p>
                    </div>
                  </div>
                </label>

                <!-- E-Wallet -->
                <label class="flex items-center gap-3 p-4 border-2 border-gray-200 dark:border-gray-600 rounded-xl cursor-pointer hover:border-matcha-400 transition-all duration-200 has-[:checked]:border-matcha-500 has-[:checked]:bg-matcha-50 dark:has-[:checked]:bg-matcha-900">
                  <input type="radio" name="payment" value="E-Wallet" class="accent-matcha-600 w-4 h-4" />
                  <div class="flex items-center gap-3 flex-1">
                    <span class="text-2xl">📱</span>
                    <div>
                      <p class="font-medium text-gray-800 dark:text-white text-sm">E-Wallet</p>
                      <p class="text-xs text-gray-500 dark:text-gray-400">GoPay, OVO, Dana, ShopeePay</p>
                    </div>
                  </div>
                </label>
              </div>
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              id="submitOrderBtn"
              class="w-full bg-matcha-600 hover:bg-matcha-700 text-white font-semibold py-4 px-6 rounded-xl transition-all duration-200 active:scale-95 flex items-center justify-center gap-2 mt-2"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              Buat Pesanan
            </button>
          </form>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="lg:col-span-2">
        <div id="checkoutSummary"></div>
      </div>
    </div>
  </main>

  <!-- Success Modal -->
  <div id="successModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
    <div id="successModalContent" class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 max-w-md w-full modal-in"></div>
  </div>

  <!-- Scripts -->
  <script src="../js/toast.js"></script>
  <script src="../data/products.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/checkout.js"></script>
  <script>
    initCheckoutPage();

    // JS fallback for payment method visual selection
    document.querySelectorAll('input[name="payment"]').forEach(radio => {
      radio.addEventListener('change', function() {
        document.querySelectorAll('input[name="payment"]').forEach(r => {
          const label = r.closest('label');
          if (r.checked) {
            label.classList.add('border-matcha-500', 'bg-matcha-50');
            label.classList.remove('border-gray-200');
          } else {
            label.classList.remove('border-matcha-500', 'bg-matcha-50');
            label.classList.add('border-gray-200');
          }
        });
      });
    });
  </script>
</body>
</html>
