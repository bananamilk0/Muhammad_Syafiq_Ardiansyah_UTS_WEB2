<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesanan Saya - MatchaShop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            matcha: {
              50: '#F5F9F0',
              100: '#E8F3DC',
              200: '#C8E6A0',
              300: '#A8D46A',
              400: '#8AAD5A',
              500: '#6B8F47',
              600: '#5C7A3E',
              700: '#4A6332',
              800: '#3D5229',
              900: '#2E3D1E',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .line-clamp-1 {
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-matcha-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">

  <!-- Navbar -->
  <div id="navbar"></div>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">
    <!-- Page Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <a href="home.html" class="text-gray-400 hover:text-matcha-600 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </a>
        <div>
          <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Pesanan Saya</h1>
          <p id="orderCount" class="text-sm text-gray-500 dark:text-gray-400"></p>
        </div>
      </div>
      <a
        href="home.html"
        class="hidden sm:flex items-center gap-2 bg-matcha-600 hover:bg-matcha-700 text-white text-sm font-medium px-4 py-2 rounded-xl transition"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Belanja Lagi
      </a>
    </div>

    <!-- Empty State -->
    <div id="emptyOrders" class="hidden text-center py-20">
      <div class="text-8xl mb-4">📦</div>
      <h3 class="text-xl font-semibold text-gray-700 dark:text-gray-300 mb-2">Belum Ada Pesanan</h3>
      <p class="text-gray-500 dark:text-gray-400 mb-6">Yuk, mulai belanja dan buat pesanan pertamamu!</p>
      <a
        href="home.html"
        class="inline-block bg-matcha-600 hover:bg-matcha-700 text-white font-semibold px-8 py-3 rounded-xl transition-all duration-200 active:scale-95"
      >
        Mulai Belanja
      </a>
    </div>

    <!-- Orders List -->
    <div id="ordersContainer" class="space-y-4"></div>
  </main>

  <!-- Scripts -->
  <script src="../js/toast.js"></script>
  <script src="../data/products.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/orders.js"></script>
  <script>
    initOrdersPage();
  </script>
</body>
</html>
