<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Produk - MatchaShop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            matcha: {
              50: '#F5F9F0',
              100: '#E8F3DC',
              200: '#C8E6A0',
              300: '#A8D46A',
              400: '#8AAD5A',
              500: '#6B8F47',
              600: '#5C7A3E',
              700: '#4A6332',
              800: '#3D5229',
              900: '#2E3D1E',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-matcha-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Product Detail Content -->
  <div id="productDetail" class="fade-in">
    <!-- Loading skeleton -->
    <div class="max-w-5xl mx-auto px-4 py-8">
      <div class="animate-pulse">
        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-64 mb-6"></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="h-80 bg-gray-200 dark:bg-gray-700 rounded-2xl"></div>
          <div class="space-y-4">
            <div class="h-6 bg-gray-200 dark:bg-gray-700 rounded w-24"></div>
            <div class="h-8 bg-gray-200 dark:bg-gray-700 rounded w-3/4"></div>
            <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/2"></div>
            <div class="h-20 bg-gray-200 dark:bg-gray-700 rounded"></div>
            <div class="h-12 bg-gray-200 dark:bg-gray-700 rounded"></div>
            <div class="h-12 bg-gray-200 dark:bg-gray-700 rounded"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Related Products Section -->
  <section class="max-w-5xl mx-auto px-4 pb-12">
    <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-4">Produk Lainnya</h2>
    <div id="relatedProducts" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
  </section>

  <!-- Scripts -->
  <script src="../js/toast.js"></script>
  <script src="../data/products.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/products.js"></script>
  <script>
    initProductDetailPage();

    // Render related products (random 4 excluding current)
    const urlParams = new URLSearchParams(window.location.search);
    const currentId = parseInt(urlParams.get('id'));
    const related = PRODUCTS.filter(p => p.id !== currentId).sort(() => Math.random() - 0.5).slice(0, 4);

    function renderRelatedCard(product) {
      const inWishlist = getWishlist().some(item => item.id === product.id);
      return `
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm hover:shadow-md transition-all duration-200 overflow-hidden group">
          <a href="product-detail.html?id=${product.id}">
            <img src="${product.image}" alt="${product.name}" class="w-full h-32 object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='https://picsum.photos/seed/${product.id}/300/200'" />
          </a>
          <div class="p-3">
            <a href="product-detail.html?id=${product.id}" class="hover:text-matcha-600 transition-colors">
              <p class="text-xs font-semibold text-gray-800 dark:text-white line-clamp-2 mb-1">${product.name}</p>
            </a>
            <p class="text-matcha-600 dark:text-matcha-400 font-bold text-sm">${formatRupiah(product.price)}</p>
          </div>
        </div>
      `;
    }

    document.getElementById('relatedProducts').innerHTML = related.map(renderRelatedCard).join('');
  </script>
</body>
</html>
